<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Pratik Gelal</title>
    <link rel="stylesheet" href="design.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Source+Code+Pro:wght@400;700;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="crt-overlay"></div>

    <nav class="navbar">
        <a href="index.html" class="logo">Pratik Gelal</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="hacker-viewport">
        <div class="contact-grid">
            <div class="terminal-section">
                <div class="terminal-header">
                    <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                    <span class="title">establish_comm_protocol.exe</span>
                </div>
                <div class="terminal-body">
                    <div class="log-line">>> System Status: <span class="accent">ONLINE</span></div>
                    <form class="hacker-form" id="contactForm">
                        <div class="form-group">
                            <label class="large-prompt">Full Name</label>
                            <input type="text" id="userName" placeholder="e.g. Pratik Gelal" required>
                        </div>
                        <div class="form-group">
                            <label class="large-prompt">Email</label>
                            <input type="email" id="userEmail" placeholder="user@domain.com" required>
                        </div>
                        <div class="form-group">
                            <label class="large-prompt">Write some message for us</label>
                            <textarea id="userMessage" placeholder="[Type message payload here...]" required></textarea>
                        </div>
                        <button type="submit" class="btn-hacker">execute::send</button>
                    </form>
                </div>
            </div>

            <div class="directory-section">
                <div class="directory-content">
                    <span class="badge">Connection Nodes</span>
                    <h2 class="directory-title">Social <span class="highlight">Directory</span></h2>
                    <div class="social-directory">
                        <div class="directory-item">
                            <i class="fab fa-instagram directory-icon"></i>
                            <a href="https://www.instagram.com/pratik_gelal/" target="_blank" class="decrypt-link"
                                data-text="Instagram Protocol">
                                <span class="decrypt-text large-text">Instagram Protocol</span>
                            </a>
                        </div>
                        <div class="directory-item">
                            <i class="fab fa-facebook directory-icon"></i>
                            <a href="https://www.facebook.com/pratik.gelal.7" target="_blank" class="decrypt-link"
                                data-text="Facebook Network">
                                <span class="decrypt-text large-text">Facebook Network</span>
                            </a>
                        </div>
                        <div class="directory-item">
                            <i class="fab fa-linkedin directory-icon"></i>
                            <a href="https://www.linkedin.com/in/pratik-gelal-9a840827a" target="_blank"
                                class="decrypt-link" data-text="LinkedIn Secure Node">
                                <span class="decrypt-text large-text">LinkedIn Secure Node</span>
                            </a>
                        </div>
                        <div class="directory-item email-node">
                            <i class="fas fa-envelope directory-icon"></i>
                            <a href="mailto:pratikgelal2063@gmail.com" class="decrypt-link"
                                data-text="pratikgelal2063@gmail.com">
                                <span class="decrypt-text large-text email-highlight">pratikgelal2063@gmail.com</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <span class="footer-logo">Pratik Gelal</span>
            <p class="copyright">&copy; 2026 Pratik Gelal. All rights reserved.</p>
        </div>
    </footer>

    <script src="function.js"></script>
</body>

</html>
